name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tier:
        description: 'Test tier (tier1|tier2|all)'
        default: 'tier1'
      tool:
        description: 'Tool for tier2 (claude|copilot|codex|all)'
        default: 'all'
      workflow:
        description: 'Workflow for tier2 (feature|bugfix|refactor|spike|all)'
        default: 'all'

jobs:
  tier1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node Testing/run.js tier1

  tier2:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.tier == 'tier2' || github.event.inputs.tier == 'all')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node Testing/run.js tier2 ${{ github.event.inputs.tool }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SDLC_TEST_WORKFLOW: ${{ github.event.inputs.workflow }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-logs
          path: Testing/logs/
